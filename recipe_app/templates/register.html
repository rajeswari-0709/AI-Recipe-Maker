<!DOCTYPE html>
<html>
<head>

    <title>Register</title>

    {% load static %}

    <link rel="stylesheet"
          href="{% static 'style.css' %}">

</head>

<body>

<div class="container">

    <h1>🍳 AI Recipe Maker</h1>

    <div class="card">

        <h2>Create Account</h2>

        <form method="POST">

            {% csrf_token %}

            <input type="text"
                   name="username"
                   placeholder="Username"
                   required>

            <input type="password"
                   name="password"
                   placeholder="Password"
                   required>

            <button type="submit">
                Register
            </button>

        </form>

        <p class="error">
            {{ message }}
        </p>

        <a href="/login/">
            Back to Login
        </a>

    </div>

</div>

</body>
</html>
