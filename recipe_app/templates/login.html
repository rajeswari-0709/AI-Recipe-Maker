<!DOCTYPE html>
<html>
<head>

    <title>Login</title>

    {% load static %}

    <link rel="stylesheet"
          href="{% static 'style.css' %}">

</head>

<body>

<div class="container">

    <h1>🍳 AI Recipe Maker</h1>

    <div class="card">

        <h2>Login</h2>

        <form method="POST">

            {% csrf_token %}

            <input type="text"
                   name="username"
                   placeholder="Username"
                   required>

            <input type="password"
                   name="password"
                   placeholder="Password"
                   required>

            <button type="submit">
                Login
            </button>

        </form>

        <p class="error">
            {{ message }}
        </p>

        <p>
            Don't have an account?
        </p>

        <a href="/register/">
            Register
        </a>

    </div>

</div>

</body>
</html>
